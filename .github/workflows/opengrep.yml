name: OpenGrep SAST

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: opengrep-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  opengrep:
    name: OpenGrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      OPENGREP_VERSION: 1.25.0
      OPENGREP_SHA256: 9ac4aebb47ba3f7b0d8fc641ac8749cb6c2f253f616131a67d9631e00d4bea33

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22

      - name: Install OpenGrep
        shell: bash
        run: |
          install_dir="${RUNNER_TEMP}/opengrep/bin"
          mkdir -p "${install_dir}"
          curl --fail --location --silent --show-error \
            --output "${install_dir}/opengrep" \
            "https://github.com/opengrep/opengrep/releases/download/v${OPENGREP_VERSION}/opengrep_manylinux_x86"
          echo "${OPENGREP_SHA256}  ${install_dir}/opengrep" | sha256sum --check
          chmod +x "${install_dir}/opengrep"
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Run OpenGrep SAST check
        run: npm run test:sast
