name: Container security

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read

concurrency:
  group: container-security-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  container-security:
    name: Build and scan container images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Prepare vulnerability reports
        run: mkdir -p trivy-reports

      - name: Build application image
        id: build-app
        env:
          IMAGE_TAG: image-uploader:${{ github.sha }}
        run: docker build --tag "$IMAGE_TAG" .

      - name: Pull Caddy image
        id: pull-caddy
        run: docker pull caddy:2-alpine

      - name: Scan application image
        id: scan-app
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: image-uploader:${{ github.sha }}
          format: json
          output: trivy-reports/application.json
          exit-code: "1"
          scanners: vuln
          vuln-type: os,library
          severity: CRITICAL

      - name: Scan Caddy image
        id: scan-caddy
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: caddy:2-alpine
          format: json
          output: trivy-reports/caddy.json
          exit-code: "1"
          scanners: vuln
          vuln-type: os,library
          severity: CRITICAL
          skip-setup-trivy: true

      - name: Record scan status
        if: always()
        env:
          APPLICATION_BUILD_OUTCOME: ${{ steps.build-app.outcome }}
          APPLICATION_SCAN_OUTCOME: ${{ steps.scan-app.outcome }}
          CADDY_PULL_OUTCOME: ${{ steps.pull-caddy.outcome }}
          CADDY_SCAN_OUTCOME: ${{ steps.scan-caddy.outcome }}
        run: |
          printf '%s\n' \
            '{' \
            '  "schemaVersion": 1,' \
            "  \"application\": {\"build\": \"${APPLICATION_BUILD_OUTCOME}\", \"scan\": \"${APPLICATION_SCAN_OUTCOME}\"}," \
            "  \"caddy\": {\"pull\": \"${CADDY_PULL_OUTCOME}\", \"scan\": \"${CADDY_SCAN_OUTCOME}\"}" \
            '}' > trivy-reports/status.json

      - name: Upload vulnerability reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-security-reports
          path: trivy-reports
          if-no-files-found: error
          retention-days: 7

      - name: Enforce container security gate
        if: always() && (steps.scan-app.outcome == 'failure' || steps.scan-caddy.outcome == 'failure')
        run: |
          echo "At least one container image scan failed or found a critical vulnerability."
          exit 1
